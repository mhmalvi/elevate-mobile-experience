name: Web CI
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      # Type-check
      - run: npx tsc --noEmit

      # Lint - 362 pre-existing no-explicit-any errors are below the 400 threshold.
      # Lower --max-warnings over time as the any backlog is resolved.
      - name: ESLint
        run: npx eslint src/ --max-warnings 400

      # Security audit - warn only until known advisories are triaged
      - name: npm audit
        run: npm audit --audit-level=high
        continue-on-error: true

      # Unit tests with coverage enforcement (thresholds in vitest.config.ts)
      - name: Unit tests with coverage
        run: npx vitest run --coverage

      # Production build
      - name: Build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: build-and-test
    # continue-on-error because several specs use test.skip() and are not yet stable
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - run: npm ci

      - name: Install Playwright browsers (chromium only for CI speed)
        run: npx playwright install --with-deps chromium

      - name: Run E2E tests
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          TEST_USER_EMAIL: ${{ secrets.TEST_USER_EMAIL }}
          TEST_USER_PASSWORD: ${{ secrets.TEST_USER_PASSWORD }}
          TEST_INVOICE_ID: ${{ secrets.TEST_INVOICE_ID }}
          TEST_QUOTE_ID: ${{ secrets.TEST_QUOTE_ID }}
        run: npx playwright test --project=chromium

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
