name: Build & Publish Android Release

on:
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Version Name (e.g., 1.2.0)'
        required: true
        default: '1.0.0'
      version_code:
        description: 'Version Code (integer, must increment each upload)'
        required: true
        default: '1'
      publish:
        description: 'Publish to Play Store internal track'
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  test-and-lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run Lint
        run: npx eslint src/ --max-warnings 400

      - name: Run Unit Tests
        run: npm run test:run

  build_release:
    runs-on: ubuntu-latest
    needs: test-and-lint
    steps:
      - name: Validate version inputs
        run: |
          if ! echo "${{ inputs.version_name }}" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::version_name must be semver (e.g., 1.2.0), got: ${{ inputs.version_name }}"
            exit 1
          fi
          if ! echo "${{ inputs.version_code }}" | grep -qE '^[1-9][0-9]*$'; then
            echo "::error::version_code must be a positive integer, got: ${{ inputs.version_code }}"
            exit 1
          fi
          echo "Building v${{ inputs.version_name }} (code ${{ inputs.version_code }})"

      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Web Assets
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Decode Keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > android/app/tradiemate-release.keystore

      - name: Build Release Bundle
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_NAME: ${{ inputs.version_name }}
          KEYSTORE_PATH: tradiemate-release.keystore
        run: |
          cd android
          chmod +x gradlew
          ./gradlew bundleRelease

      - name: Upload AAB Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release-v${{ inputs.version_name }}-${{ inputs.version_code }}
          path: android/app/build/outputs/bundle/release/app-release.aab

      - name: Publish to Play Store (internal track)
        if: ${{ inputs.publish }}
        env:
          KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          VERSION_CODE: ${{ inputs.version_code }}
          VERSION_NAME: ${{ inputs.version_name }}
          KEYSTORE_PATH: tradiemate-release.keystore
        run: |
          echo '${{ secrets.PLAY_SERVICE_ACCOUNT_JSON }}' > android/app/play-service-account.json
          cd android
          ./gradlew :app:publishReleaseBundle
